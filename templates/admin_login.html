<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <style>

        body{
            font-family: Arial;
            background:#020617;
            color:white;
            text-align:center;
        }

        .box{

            width:350px;

            margin:auto;

            margin-top:100px;

            padding:40px;

            background:#111827;

            border-radius:20px;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border:none;

            border-radius:10px;

        }

        button{

            width:100%;

            padding:12px;

            margin-top:20px;

            border:none;

            border-radius:10px;

            background:#00f5ff;

            font-weight:bold;

            cursor:pointer;

        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Admin Login 🔐</h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">

                Login

            </button>

        </form>

    </div>

</body>

</html>
