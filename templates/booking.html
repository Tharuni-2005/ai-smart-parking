<!DOCTYPE html>
<html>
<head>

    <title>Book Parking Slot</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }

        .form-box{
            width: 400px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        input, select{
            width: 90%;
            padding: 10px;
            margin-top: 15px;
        }

        button{
            padding: 12px 20px;
            background: green;
            color: white;
            border: none;
            margin-top: 20px;
            cursor: pointer;
        }

    </style>

</head>
<body>

    <div class="form-box">

        <h2>Book Slot {{ slot.slot_name }}</h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="user_name"
                   placeholder="Enter Your Name"
                   required>

            <input type="text"
                   name="phone_number"
                   placeholder="Phone Number"
                   required>

            <input type="text"
                   name="vehicle_number"
                   placeholder="Vehicle Number"
                   required>

            <select name="vehicle_type" required>

                <option value="">Select Vehicle Type</option>

                <option value="Car">Car</option>

                <option value="Bike">Bike</option>

                <option value="EV">EV</option>

            </select>

            <button type="submit">
                Confirm Booking
            </button>

        </form>

    </div>

</body>
</html>
